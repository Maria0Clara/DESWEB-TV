<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smartphones</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<header><div class="logo">Smartphones</div></header>

<nav>
<a href="index.html">Home</a>
</nav>

<div class="container grid">

<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/11/29/12/30/iphone-1867461_1280.jpg">
<h3>iPhone 15</h3>
<p class="price">R$ 5.299</p>
<button onclick="addToCart('iPhone 15',5299)">Comprar</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2017/05/31/18/38/smartphone-2367511_1280.jpg">
<h3>Samsung S23</h3>
<p class="price">R$ 3.999</p>
<button onclick="addToCart('S23',3999)">Comprar</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2017/01/06/19/15/phone-1955661_1280.jpg">
<h3>Xiaomi 13</h3>
<p class="price">R$ 2.899</p>
<button onclick="addToCart('Xiaomi 13',2899)">Comprar</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2015/05/31/10/55/smartphone-791160_1280.jpg">
<h3>Motorola Edge</h3>
<p class="price">R$ 2.199</p>
<button onclick="addToCart('Motorola Edge',2199)">Comprar</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2017/01/06/19/15/phone-1955661_1280.jpg">
<h3>Galaxy A54</h3>
<p class="price">R$ 1.999</p>
<button onclick="addToCart('A54',1999)">Comprar</button>
</div>

<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/11/29/12/30/iphone-1867461_1280.jpg">
<h3>iPhone 14</h3>
<p class="price">R$ 4.799</p>
<button onclick="addToCart('iPhone 14',4799)">Comprar</button>
</div>

</div>

<div class="cartBox" id="cartBox"></div>

</body>
</html>
